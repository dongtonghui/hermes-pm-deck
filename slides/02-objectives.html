<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>02 · 分享目标</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .slide-content { display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; gap: 80px; align-items: center; }
  .left { flex: 1; }
  .left h2 { font-size: 84px; margin-bottom: 32px; }
  .left .body-large { max-width: 640px; }
  .right { flex: 1.1; display: flex; flex-direction: column; gap: 28px; }
  .goal {
    display: flex; gap: 28px; align-items: flex-start;
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 32px; box-shadow: 0 4px 20px rgba(28,27,24,0.05);
  }
  .goal-num {
    font-family: var(--font-display); font-size: 56px; font-weight: 900;
    color: var(--accent); line-height: 1; min-width: 64px;
  }
  .goal h4 { font-family: var(--font-body); font-size: 30px; margin-bottom: 8px; }
  .goal p { font-size: var(--small); color: var(--ink-secondary); line-height: 1.55; }
</style>
</head>
<body>
<div class="slide-content">
  <div class="page-masthead">
    <div class="brand">AI 工具深度应用</div>
    <div>02 / 31 · 分享目标</div>
  </div>
  <div class="main">
    <div class="left">
      <div class="kicker">Objectives</div>
      <h2>今天想让你<br><span class="accent">带走什么</span></h2>
      <p class="body-large">45 分钟后，你会对 AI 工具有新的使用方式，并知道如何把 Hermes 桌面端放进日常流程。</p>
    </div>
    <div class="right">
      <div class="goal">
        <div class="goal-num">01</div>
        <div>
          <h4>拓宽使用方式</h4>
          <p>理解 AI 不只是聊天框，还可以是研究员、写手、分析师和原型师。</p>
        </div>
      </div>
      <div class="goal">
        <div class="goal-num">02</div>
        <div>
          <h4>建立工作流意识</h4>
          <p>掌握 Skills 增强 + 定时任务 + 跨会话记忆的组合用法。</p>
        </div>
      </div>
      <div class="goal">
        <div class="goal-num">03</div>
        <div>
          <h4>上手 Hermes 桌面端</h4>
          <p>了解它为什么是适合硬件 PM 日常使用的入口，并知道从哪开始。</p>
        </div>
      </div>
    </div>
  </div>
  <div class="page-footer">
    <div class="section-tag">开场</div>
    <div>Hermes 桌面端内部分享</div>
  </div>
</div>
</body>
</html>
